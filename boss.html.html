<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OBA Hair BOSS 看板 V1</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f8f4f1;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#eadfd6;--brand:#9ed8cf;--soft:#fcfbfa;--radius:24px}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#fcfaf8 0%,var(--bg) 100%);color:var(--ink)}
.wrap{max-width:1080px;margin:0 auto;padding:18px}.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap}.title{font-size:clamp(28px,5vw,42px);font-weight:900;margin:0}.sub{color:var(--muted);margin-top:6px;font-size:14px}.pill{background:rgba(158,216,207,.28);color:#18453f;border:1px solid rgba(79,145,136,.18);border-radius:999px;padding:10px 14px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}.wrap{padding:12px}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 10px 24px rgba(80,60,40,.04)}.k{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:8px}.v{font-size:32px;font-weight:950;letter-spacing:-.5px}.section{font-size:22px;font-weight:950;margin:22px 0 10px}.small{font-size:13px;color:var(--muted);font-weight:800}.paygrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:760px){.paygrid{grid-template-columns:1fr}}
.notice{border:1px dashed var(--line);background:var(--soft);border-radius:18px;padding:14px;color:var(--muted);font-weight:800;line-height:1.6}.hide{display:none!important}.status-ok{color:#245f38}.status-bad{color:#9b1c1c}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1 class="title">OBA Hair BOSS 看板</h1>
      <div class="sub">唯讀模式｜只看總數據｜不可收款、不可改資料</div>
    </div>
    <div class="pill" id="syncStatus">同步中...</div>
  </div>

  <div class="grid">
    <div class="card"><div class="k">今日營業額</div><div class="v" id="todaySales">$0</div><div class="small" id="todayDate">--</div></div>
    <div class="card"><div class="k">今日筆數</div><div class="v" id="todayCount">0</div><div class="small">已扣除退票</div></div>
    <div class="card"><div class="k">本月營業額</div><div class="v" id="monthSales">$0</div><div class="small" id="monthDate">--</div></div>
  </div>

  <div class="section">今日收款方式</div>
  <div class="paygrid">
    <div class="card"><div class="k">現金</div><div class="v" id="payCash">$0</div></div>
    <div class="card"><div class="k">轉帳</div><div class="v" id="payTransfer">$0</div></div>
    <div class="card"><div class="k">LINE Pay</div><div class="v" id="payLine">$0</div></div>
  </div>

  <div class="section">本月總覽</div>
  <div class="grid">
    <div class="card"><div class="k">本月筆數</div><div class="v" id="monthCount">0</div></div>
    <div class="card"><div class="k">本月退票金額</div><div class="v" id="monthRefund">$0</div></div>
    <div class="card"><div class="k">目前最新單號</div><div class="v" id="nextNo">--</div></div>
  </div>

  <div class="section">說明</div>
  <div class="notice">這個頁面是老闆觀看用，不含收銀按鈕、不含員工管理、不顯示單筆明細。資料會自動同步更新。</div>
</div>

<script>
const SUPABASE_URL = "https://cvehdsmeaggqmdsafalw.supabase.co";
const SUPABASE_KEY = "sb_publishable_BxcVgGxDTlUwpEL0URXmGA_Ebod3ulA";
const CLOUD_TABLE = "oba_pos_state";
const CLOUD_ROW_ID = "main";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = s => document.querySelector(s);
function money(n){return '$'+Number(n||0).toLocaleString('zh-TW')}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function monthStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function orderNo(n){return 'OBA-'+String(n||1).padStart(6,'0')}
function isValidOrder(o){return o && !o.refunded}
function render(data){
  const state = data || {orders:[],refunds:[],nextNo:1};
  const today=todayStr(), month=monthStr();
  const orders = Array.isArray(state.orders) ? state.orders : [];
  const refunds = Array.isArray(state.refunds) ? state.refunds : [];
  const todayOrders = orders.filter(o=>isValidOrder(o) && o.date===today);
  const monthOrders = orders.filter(o=>isValidOrder(o) && String(o.date||'').startsWith(month));
  const monthRefunds = refunds.filter(r=>String(r.date||'').startsWith(month));
  $('#todaySales').textContent = money(todayOrders.reduce((s,o)=>s+Number(o.total||0),0));
  $('#todayCount').textContent = todayOrders.length;
  $('#monthSales').textContent = money(monthOrders.reduce((s,o)=>s+Number(o.total||0),0));
  $('#monthCount').textContent = monthOrders.length;
  $('#monthRefund').textContent = money(monthRefunds.reduce((s,r)=>s+Number(r.total||0),0));
  $('#payCash').textContent = money(todayOrders.filter(o=>o.paymentMethod==='現金').reduce((s,o)=>s+Number(o.total||0),0));
  $('#payTransfer').textContent = money(todayOrders.filter(o=>o.paymentMethod==='轉帳').reduce((s,o)=>s+Number(o.total||0),0));
  $('#payLine').textContent = money(todayOrders.filter(o=>o.paymentMethod==='LINE Pay').reduce((s,o)=>s+Number(o.total||0),0));
  $('#nextNo').textContent = orderNo(state.nextNo || 1);
  $('#todayDate').textContent = today;
  $('#monthDate').textContent = month;
}
async function loadBossData(){
  try{
    const {data,error} = await client.from(CLOUD_TABLE).select('data,updated_at').eq('id', CLOUD_ROW_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      render(data.data);
      $('#syncStatus').textContent = '已同步 '+ new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      $('#syncStatus').className='pill status-ok';
    }else{
      render({orders:[],refunds:[],nextNo:1});
      $('#syncStatus').textContent = '尚無雲端資料';
      $('#syncStatus').className='pill status-bad';
    }
  }catch(err){
    console.log(err);
    $('#syncStatus').textContent = '同步失敗';
    $('#syncStatus').className='pill status-bad';
  }
}
loadBossData();
setInterval(loadBossData, 10000);
</script>
</body>
</html>
